services:
  - type: web
    name: geoanalyzer-api
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GOOGLE_PLACES_LANGUAGE
        value: fr
      - key: DEFAULT_WILAYA
        value: Oran
      - key: PYTHON_VERSION
        value: 3.12.8
